<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }

    body{
        background:#f0f0f0;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .calculator{
        width:320px;
        background:#222;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 15px rgba(0,0,0,0.4);
    }

    #display{
        width:100%;
        height:60px;
        font-size:28px;
        text-align:right;
        padding:10px;
        border:none;
        border-radius:5px;
        margin-bottom:15px;
        background:white;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
    }

    button{
        height:60px;
        font-size:22px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        background:#444;
        color:white;
    }

    button:hover{
        background:#666;
    }

    .operator{
        background:orange;
        color:white;
    }

    .operator:hover{
        background:darkorange;
    }

    .equal{
        background:green;
    }

    .equal:hover{
        background:darkgreen;
    }

    .clear{
        background:red;
    }

    .clear:hover{
        background:darkred;
    }
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear">C</button>
<button>/</button>
<button>*</button>
<button>-</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button>+</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button>.</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button class="equal">=</button>

<button style="grid-column:span 4;">0</button>

</div>

</div>

<script>

let display = document.getElementById("display");

let buttons = document.querySelectorAll("button");

buttons.forEach(function(button){

    button.addEventListener("click",function(){

        let value = this.innerText;

        if(value=="C"){
            display.value="";
        }

        else if(value=="="){

            try{
                display.value = eval(display.value);
            }
            catch{
                display.value="Error";
            }

        }

        else{
            display.value += value;
        }

    });

});

</script>

</body>
</html>
